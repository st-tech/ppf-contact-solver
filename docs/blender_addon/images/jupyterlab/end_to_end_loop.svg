<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" role="img" aria-label="JupyterLab end-to-end loop: Blender transfers and exports, Blender quits, JupyterLab runs the simulation, Blender relaunches and fetches">
  <title>JupyterLab end-to-end loop</title>
  <desc>
    A three-lane sequence diagram. The left lane is the first Blender
    session. The middle lane is JupyterLab running on the solver host.
    The right lane is a later Blender session. Time flows top to
    bottom. The first Blender session transfers mesh and parameters,
    exports the notebook, and optionally starts the solver server.
    Blender then quits. JupyterLab drives the simulation through
    app.session.run, preview, and stream, and frames land on disk on
    the solver host. A later Blender session launches, connects, and
    fetches the animation; the solver host hands the PC2 cache back to
    the meshes.
  </desc>

  <defs>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e6da4" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a8a3a" />
    </marker>
  </defs>

  <style>
    .hdr-title  { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
    .hdr-sub    { font: italic 12px -apple-system, sans-serif; fill: #555; }
    .hdr-bg-b1  { fill: #e9eef7; stroke: #8fa7c7; stroke-width: 1; }
    .hdr-bg-jup { fill: #fff3e0; stroke: #d7a95a; stroke-width: 1; }
    .hdr-bg-b2  { fill: #e9eef7; stroke: #8fa7c7; stroke-width: 1; }
    .lifeline   { stroke: #aaa; stroke-width: 1.2; stroke-dasharray: 4 4; }
    .arr-b      { stroke: #2e6da4; stroke-width: 2; fill: none; }
    .arr-g      { stroke: #3a8a3a; stroke-width: 2; fill: none; }
    .arr-k      { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .lbl        { font: 600 13px -apple-system, sans-serif; fill: #1a1a1a; }
    .lbl-mono   { font: 600 12px "Menlo", "Consolas", monospace; fill: #1a1a1a; }
    .note       { font: 12px -apple-system, sans-serif; fill: #555; }
    .marker-bg  { fill: #fff3e0; stroke: #d7a95a; stroke-width: 1.2; }
    .marker-tx  { font: 700 12px -apple-system, sans-serif; fill: #7a4a00; }
    .self-bg    { fill: #f2f7ef; stroke: #86b36a; stroke-width: 1; }
    .self-tx    { font: 600 12px "Menlo", "Consolas", monospace; fill: #1a4a1a; }
    .phase-tx   { font: italic 12px -apple-system, sans-serif; fill: #888; }
  </style>

  <!-- Lane headers -->
  <rect x="30"  y="20" width="200" height="54" rx="6" class="hdr-bg-b1" />
  <text x="130" y="43" text-anchor="middle" class="hdr-title">Blender (1)</text>
  <text x="130" y="62" text-anchor="middle" class="hdr-sub">initial session</text>

  <rect x="300" y="20" width="260" height="54" rx="6" class="hdr-bg-jup" />
  <text x="430" y="43" text-anchor="middle" class="hdr-title">JupyterLab</text>
  <text x="430" y="62" text-anchor="middle" class="hdr-sub">on solver host</text>

  <rect x="630" y="20" width="200" height="54" rx="6" class="hdr-bg-b2" />
  <text x="730" y="43" text-anchor="middle" class="hdr-title">Blender (2)</text>
  <text x="730" y="62" text-anchor="middle" class="hdr-sub">later session</text>

  <!-- Lifelines -->
  <line x1="130" y1="74" x2="130" y2="580" class="lifeline" />
  <line x1="430" y1="74" x2="430" y2="580" class="lifeline" />
  <line x1="730" y1="74" x2="730" y2="580" class="lifeline" />

  <!-- Phase label: setup -->
  <text x="20" y="100" class="phase-tx">Setup</text>

  <!-- Transfer arrow -->
  <line x1="140" y1="115" x2="420" y2="115" class="arr-b" marker-end="url(#arrow-blue)" />
  <text x="280" y="108" text-anchor="middle" class="lbl">Transfer</text>
  <text x="280" y="131" text-anchor="middle" class="note">mesh + params pickled</text>

  <!-- Export notebook arrow -->
  <line x1="140" y1="160" x2="420" y2="160" class="arr-b" marker-end="url(#arrow-blue)" />
  <text x="280" y="153" text-anchor="middle" class="lbl">Export notebook</text>
  <text x="280" y="176" text-anchor="middle" class="lbl-mono">&lt;project&gt;.ipynb</text>

  <!-- Start Server arrow (optional) -->
  <line x1="140" y1="205" x2="420" y2="205" class="arr-b" marker-end="url(#arrow-blue)" />
  <text x="280" y="198" text-anchor="middle" class="lbl">Start Server</text>
  <text x="280" y="221" text-anchor="middle" class="note">(optional)</text>

  <!-- Quit Blender marker on the left lane -->
  <rect x="70" y="245" width="120" height="26" rx="13" class="marker-bg" />
  <text x="130" y="263" text-anchor="middle" class="marker-tx">QUIT BLENDER</text>

  <!-- Phase label: simulate -->
  <text x="20" y="300" class="phase-tx">Simulate</text>

  <!-- JupyterLab self-activation box with run/preview/stream -->
  <rect x="330" y="290" width="200" height="80" rx="6" class="self-bg" />
  <text x="430" y="310" text-anchor="middle" class="self-tx">app.session.run()</text>
  <text x="430" y="330" text-anchor="middle" class="self-tx">app.session.preview()</text>
  <text x="430" y="350" text-anchor="middle" class="self-tx">app.session.stream()</text>
  <text x="430" y="366" text-anchor="middle" class="note">Blender closed; solver host drives the sim</text>

  <!-- Frames land on disk: small self-loop on JupyterLab lane -->
  <path d="M 480 400 C 560 400 560 430 480 430" class="arr-g" fill="none" marker-end="url(#arrow-green)" />
  <text x="568" y="419" class="note">frames land on disk</text>

  <!-- Launch Blender marker on the right lane -->
  <rect x="670" y="455" width="120" height="26" rx="13" class="marker-bg" />
  <text x="730" y="473" text-anchor="middle" class="marker-tx">LAUNCH BLENDER</text>

  <!-- Phase label: fetch -->
  <text x="20" y="508" class="phase-tx">Fetch</text>

  <!-- Connect + Fetch from Blender(2) back to JupyterLab lane (host) -->
  <line x1="720" y1="510" x2="440" y2="510" class="arr-b" marker-end="url(#arrow-blue)" />
  <text x="580" y="503" text-anchor="middle" class="lbl">Connect + Fetch</text>
  <text x="580" y="526" text-anchor="middle" class="lbl-mono">fetch_animation()</text>

  <!-- PC2 cache returned to Blender(2) -->
  <line x1="440" y1="560" x2="720" y2="560" class="arr-g" marker-end="url(#arrow-green)" />
  <text x="580" y="553" text-anchor="middle" class="lbl">PC2 cache</text>
  <text x="580" y="576" text-anchor="middle" class="note">attached to the meshes</text>
</svg>
