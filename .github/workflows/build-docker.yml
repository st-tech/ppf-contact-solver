# File: build-docker.yml
# Code: Claude Code and Codex
# Review: Ryoichi Ando (ryoichi.ando@zozo.com)
# License: Apache v2.0
#
# Builds the compiled GPU runtime container image from ./Dockerfile, smoke-tests
# it on a real GPU, and (public repo only) publishes it to GHCR. Like the
# per-example workflows (see template/aws-template.yml), the GitHub-hosted
# ubuntu-latest runner is only an orchestrator: it assumes an AWS OIDC role,
# launches one ephemeral Deep Learning GPU EC2 instance, and drives docker build
# + `docker run --gpus all` over an EC2 Instance Connect SSH tunnel, then always
# terminates the instance. A GPU is required because the image ships an sm_86
# SASS anchor plus compute_86 PTX that only JITs forward; the default g6/g6e
# (L4/L40S, sm_89) run it, while an older card (e.g. a T4, sm_75) cannot. The
# docker build itself is a CUDA cross-compile and needs no GPU, but is run on the
# same instance to keep the build context and the smoke-tested image co-located.

name: Docker Build
run-name: Docker Build

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + smoke-test only, do not push)'
        required: true
        type: boolean
        default: false
      instance_type:
        description: 'EC2 instance type'
        required: true
        default: 'g6e.2xlarge'
        type: choice
        options:
          - g6.2xlarge
          - g6e.2xlarge
      region:
        description: 'AWS Region'
        required: true
        default: 'us-east-2'
        type: choice
        options:
          - us-east-1
          - us-east-2
          - ap-northeast-1

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}-compiled:latest
  AWS_REGION: ${{ github.event.inputs.region }}
  INSTANCE_TYPE: ${{ github.event.inputs.instance_type }}
  BRANCH: ${{ github.ref_name }}
  WORKDIR: /home/ubuntu
  # Extract the repo into a clean subdir (NOT /home/ubuntu, which holds .ssh):
  # the Dockerfile does `COPY . /root/...`, so the build context must not include
  # the instance's SSH keys or other home-dir junk.
  REMOTE_SRC: /home/ubuntu/src

jobs:
  build-image:
    name: Build + smoke-test on GPU Instance
    runs-on: ubuntu-latest
    # EC2 boot + AMI/VPC lookup + full Docker image build (CUDA + ffmpeg) happen
    # inside the job, so allow generous headroom.
    timeout-minutes: 90
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Show input parameters
        run: |
          echo "## Input Parameters"
          echo "Branch: ${{ github.ref_name }}"
          echo "Instance Type: ${{ github.event.inputs.instance_type }}"
          echo "Region: ${{ github.event.inputs.region }}"
          echo "Dry run: ${{ github.event.inputs.dry_run }}"
          echo "Image: $IMAGE"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 21600

      - name: Verify AWS authentication
        run: |
          echo "Testing AWS authentication..."
          aws sts get-caller-identity
          echo "AWS Region: $AWS_REGION"
          echo "Instance Type: $INSTANCE_TYPE"
          echo "Branch: $BRANCH"

      - name: Find Deep Learning AMI and network resources
        id: setup
        run: |
          echo "Finding latest Deep Learning AMI with GPU support..."
          AMI_ID=$(aws ec2 describe-images \
            --owners amazon \
            --filters \
              "Name=name,Values=Deep Learning Base OSS Nvidia Driver GPU AMI (Ubuntu 24.04)*" \
              "Name=state,Values=available" \
              "Name=architecture,Values=x86_64" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --region "$AWS_REGION" \
            --output text)

          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            echo "ERROR: Deep Learning AMI not found in region $AWS_REGION"
            exit 1
          fi
          echo "AMI_ID=$AMI_ID" >> $GITHUB_OUTPUT
          echo "Found AMI: $AMI_ID"

          # Get GitHub Actions dedicated VPC, subnet, and security group
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=github-actions-vpc" --query 'Vpcs[0].VpcId' --output text)
          SUBNET_ID=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[0].SubnetId' --output text)
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=github-actions-sg" --query 'SecurityGroups[0].GroupId' --output text)

          if [ "$VPC_ID" = "None" ] || [ -z "$VPC_ID" ]; then
            echo "ERROR: github-actions-vpc not found in region $AWS_REGION"
            exit 1
          fi

          echo "::add-mask::$VPC_ID"
          echo "::add-mask::$SUBNET_ID"
          echo "::add-mask::$SG_ID"
          echo "SUBNET_ID=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "SG_ID=$SG_ID" >> $GITHUB_OUTPUT
          echo "VPC: $VPC_ID, Subnet: $SUBNET_ID, SG: $SG_ID"

      - name: Generate unique identifiers and SSH key
        id: ids
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RANDOM_SUFFIX=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          TEMP_INSTANCE_ID="temp-${TIMESTAMP}-${RANDOM_SUFFIX}"
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "TEMP_INSTANCE_ID=$TEMP_INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Temporary Instance ID: $TEMP_INSTANCE_ID"

          # Generate SSH key early so we can embed it in user-data
          rm -f /tmp/ec2key /tmp/ec2key.pub
          ssh-keygen -t rsa -f /tmp/ec2key -N "" -q
          echo "SSH key generated"

      - name: Create user data script
        run: |
          SSH_PUBKEY=$(cat /tmp/ec2key.pub)
          cat > /tmp/user-data.sh << EOF
          #!/bin/bash
          set -x
          exec > >(tee /var/log/user-data.log) 2>&1

          echo "=== User Data Script Started ==="

          # Wait for system to be ready
          sleep 5

          # Setup SSH key for persistent authentication (no 60s expiry)
          mkdir -p /home/ubuntu/.ssh
          echo "${SSH_PUBKEY}" >> /home/ubuntu/.ssh/authorized_keys
          chown -R ubuntu:ubuntu /home/ubuntu/.ssh
          chmod 700 /home/ubuntu/.ssh
          chmod 600 /home/ubuntu/.ssh/authorized_keys
          echo "SSH key installed permanently"

          # Verify nvidia-smi is available
          if command -v nvidia-smi &> /dev/null; then
              echo "NVIDIA drivers confirmed"
              nvidia-smi
          else
              echo "Warning: nvidia-smi not found"
          fi

          # Create workspace directory
          mkdir -p /home/ubuntu/workspace
          chown -R ubuntu:ubuntu /home/ubuntu/workspace

          nvidia-smi | tee /tmp/nvidia-smi-output.txt
          touch /tmp/setup-complete
          echo "=== User Data Script Complete ==="
          EOF

      - name: Launch EC2 instance
        id: instance
        run: |
          echo "Launching EC2 instance..."

          # Base64 encode for AWS
          USER_DATA=$(base64 -w 0 /tmp/user-data.sh)

          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${{ steps.setup.outputs.AMI_ID }}" \
            --instance-type "$INSTANCE_TYPE" \
            --subnet-id "${{ steps.setup.outputs.SUBNET_ID }}" \
            --security-group-ids "${{ steps.setup.outputs.SG_ID }}" \
            --associate-public-ip-address \
            --user-data "$USER_DATA" \
            --block-device-mappings "DeviceName=/dev/sda1,Ebs={VolumeSize=256,VolumeType=gp3,DeleteOnTermination=true}" \
            --tag-specifications \
              "ResourceType=instance,Tags=[\
                {Key=Name,Value=gpu-runner-${{ steps.ids.outputs.TIMESTAMP }}},\
                {Key=ManagedBy,Value=GitHubActions},\
                {Key=Purpose,Value=GPURunner},\
                {Key=Workflow,Value=${{ github.workflow }}},\
                {Key=RunId,Value=${{ github.run_id }}},\
                {Key=Branch,Value=${{ env.BRANCH }}},\
                {Key=Example,Value=docker-build}\
              ]" \
              "ResourceType=volume,Tags=[\
                {Key=Name,Value=gpu-runner-${{ steps.ids.outputs.TIMESTAMP }}-volume},\
                {Key=ManagedBy,Value=GitHubActions},\
                {Key=Purpose,Value=GPURunner},\
                {Key=Workflow,Value=${{ github.workflow }}},\
                {Key=Example,Value=docker-build}\
              ]" \
            --instance-initiated-shutdown-behavior terminate \
            --query 'Instances[0].InstanceId' \
            --region "$AWS_REGION" \
            --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Instance launched: $INSTANCE_ID"

      - name: Wait for instance and establish tunnel
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.INSTANCE_ID }}"
          echo "Waiting for instance to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID" --region "$AWS_REGION"

          echo "Instance is running, waiting for user-data to complete..."

          # Wait for setup-complete (user-data finished, SSH key installed)
          MAX_ATTEMPTS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            # Open tunnel temporarily
            aws ec2-instance-connect open-tunnel \
              --instance-id "$INSTANCE_ID" \
              --local-port 2222 &
            TUNNEL_PID=$!
            sleep 3

            # Check if setup is complete (includes SSH connectivity check)
            if ssh -i /tmp/ec2key -p 2222 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 \
              ubuntu@localhost "test -f /tmp/setup-complete && echo READY" 2>/dev/null | grep -q READY; then
              echo "Instance setup completed on attempt $i"
              kill $TUNNEL_PID 2>/dev/null || true
              break
            fi

            kill $TUNNEL_PID 2>/dev/null || true

            if [ $i -eq $MAX_ATTEMPTS ]; then
              echo "Setup timeout after $MAX_ATTEMPTS attempts, continuing anyway..."
              break
            fi

            echo "Attempt $i/$MAX_ATTEMPTS: Setup not complete, waiting 10s..."
            sleep 10
          done

          # Save instance ID for subsequent steps
          echo "$INSTANCE_ID" > /tmp/instance_id.txt

      - name: Create archive of repository
        run: |
          echo "Creating repository archive..."
          git archive --format=tar.gz --output=/tmp/repo.tar.gz HEAD

      - name: Transfer repository to instance
        run: |
          echo "Transferring repository to instance..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          rsync -avz -e "ssh -i /tmp/ec2key -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            /tmp/repo.tar.gz ubuntu@localhost:${WORKDIR}/

          # Extract into a clean subdir so the docker build context is exactly
          # the repo (no /home/ubuntu/.ssh etc. swept into `COPY .`).
          ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@localhost \
            "rm -rf ${REMOTE_SRC} && mkdir -p ${REMOTE_SRC} && tar -xzf ${WORKDIR}/repo.tar.gz -C ${REMOTE_SRC} && rm ${WORKDIR}/repo.tar.gz"

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Build Compiled Image
        run: |
          echo "Building $IMAGE on the GPU instance..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          # sudo docker: the DL AMI runs the daemon as root; sudo is passwordless
          # and works whether or not `ubuntu` is in the docker group.
          ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=30 \
            ubuntu@localhost \
            "cd ${REMOTE_SRC} && sudo -n docker build -t ${IMAGE} ."

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Run headless.py on built image
        run: |
          echo "Running examples/headless.py in the built image (GPU)..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ubuntu@localhost \
            "sudo -n docker run --rm --gpus all ${IMAGE} /bin/sh -c 'cd /root/ppf-contact-solver && PYTHONPATH=/root/ppf-contact-solver /root/.local/share/ppf-cts/venv/bin/python examples/headless.py'"

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Run fast_check on built image
        run: |
          echo "Running warmup.py fast_check in the built image (GPU)..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ubuntu@localhost \
            "sudo -n docker run --rm --gpus all ${IMAGE} /bin/sh -c 'cd /root/ppf-contact-solver && /root/.local/share/ppf-cts/venv/bin/python warmup.py fast_check && /root/.local/share/ppf-cts/venv/bin/python warmup.py clear_all'"

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Push Compiled Image
        # Skipped on dry runs and on any *-private repo: the private mirror runs
        # this workflow to validate the build + smoke tests end-to-end without
        # publishing, so only the public repo writes the latest tag to GHCR.
        if: ${{ !inputs.dry_run && !endsWith(github.repository, '-private') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Pushing $IMAGE to ${REGISTRY}..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          # SECURITY (token must never leak):
          #   * The token is fed ONLY through ssh stdin into
          #     `docker login --password-stdin`. It is never an argv (local or
          #     remote), so it cannot appear in `ps`, in shell history, or in
          #     the ssh command string; `echo` is a shell builtin (no argv).
          #   * GitHub auto-masks secrets.GITHUB_TOKEN in the step log.
          #   * `sudo -n` (non-interactive) guarantees sudo never prompts for a
          #     password, so sudo cannot consume the piped token as its own
          #     password; the DL AMI grants ubuntu passwordless sudo.
          #   * `docker logout` wipes the credential from /root/.docker on the
          #     instance immediately after the push, and the instance is
          #     terminated unconditionally afterward (if: always() cleanup +
          #     shutdown-behavior=terminate), so no credential persists.
          #   * The credential is written only AFTER the image is built, and to
          #     the host's /root/.docker (never into any image layer).
          echo "$GH_TOKEN" | ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ubuntu@localhost \
            "sudo -n docker login ${REGISTRY} -u '${ACTOR}' --password-stdin && sudo -n docker push ${IMAGE} && sudo -n docker logout ${REGISTRY}"

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Push skipped
        if: ${{ inputs.dry_run || endsWith(github.repository, '-private') }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Push skipped: dry run requested (build + smoke tests still ran)."
          else
            echo "Push skipped: ${{ github.repository }} ends with '-private'."
            echo "Build + smoke tests passed; the public repo handles GHCR publishing."
          fi

      - name: GPU information
        if: success() || failure()
        run: |
          echo "Getting GPU information..."
          INSTANCE_ID=$(cat /tmp/instance_id.txt)

          aws ec2-instance-connect open-tunnel \
            --instance-id "$INSTANCE_ID" \
            --local-port 2222 &
          TUNNEL_PID=$!
          sleep 5

          ssh -i /tmp/ec2key -p 2222 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ubuntu@localhost \
            "nvidia-smi" || echo "Failed to get GPU info"

          kill $TUNNEL_PID 2>/dev/null || true

      - name: Cleanup - SSH keys
        if: always()
        continue-on-error: true
        run: |
          # Clean up SSH keys
          rm -f /tmp/ec2key /tmp/ec2key.pub /tmp/instance_id.txt

      - name: Re-authenticate for cleanup
        if: always()
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 21600

      - name: Cleanup - Terminate Instance
        if: always()
        continue-on-error: true
        run: |
          if [ -n "${{ steps.instance.outputs.INSTANCE_ID }}" ]; then
            echo "Initiating instance termination: ${{ steps.instance.outputs.INSTANCE_ID }}"
            aws ec2 terminate-instances \
              --instance-ids "${{ steps.instance.outputs.INSTANCE_ID }}" \
              --region "$AWS_REGION" || true
            echo "Termination initiated. Instance will terminate in the background."
          else
            echo "No instance to terminate"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Workflow Summary"
          echo "- Region: $AWS_REGION"
          echo "- Instance Type: $INSTANCE_TYPE"
          echo "- Branch: $BRANCH"
          echo "- Image: $IMAGE"
          echo "- Dry run: ${{ github.event.inputs.dry_run }}"
          echo "- Instance ID: ${{ steps.instance.outputs.INSTANCE_ID || 'Not launched' }}"
