# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Python API Docs

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    # Only build/deploy from the main branch. Triggering workflow_dispatch
    # against any other ref (e.g. dev, which carries private source) is a
    # no-op so private content can't reach GitHub Pages.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build Docs
        run: bash docs/build.sh
      - name: List Artifacts
        run: ls -al ./docs/_build/
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_build/
          name: github-pages
          retention-days: 1

  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
