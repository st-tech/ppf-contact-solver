name: Getting Started

on:
  workflow_dispatch:

jobs:
  headless:
    runs-on: ppf-contact-solver-NVIDIA
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: check out repo
        uses: actions/checkout@v5

      - name: install NVIDIA driver and CUDA toolkit
        run: |
          curl -fSsL -O https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get -y install cuda-toolkit-12-8

      - name: check GPU
        run: nvidia-smi

      - name: warmup
        run: python3 warmup.py --skip-confirmation

      - name: build
        run: ~/.cargo/bin/cargo build --release

      - name: build + install ppf-cts-py wheel
        # The frontend hard-imports `_ppf_cts_py`; without the maturin
        # build the headless run fails at import time. Mirrors the step
        # in blender.yml.
        run: |
          source "$HOME/.cargo/env"
          source ~/.local/share/ppf-cts/venv/bin/activate
          pip install --upgrade maturin
          cd crates/ppf-cts-py
          maturin develop --release
          python -c "import _ppf_cts_py as m; print('schema_version', m.schema_version())"

      - name: run headless
        run: |
          echo "getting-started" > frontend/.CI
          export PYTHONPATH=$PWD
          ~/.local/share/ppf-cts/venv/bin/python examples/headless.py

      - name: Collect results
        if: success() || failure()
        run: |
          echo "Collecting results..."
          mkdir -p ci
          if [ -d "/tmp/ci" ]; then
            rsync -av --exclude='*.bin' --exclude='*.pickle' /tmp/ci/ ./ci/
          fi
          echo "## Collected Files:"
          ls -la ci/ || echo "No files collected"

      - name: Upload artifact
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-getting-started
          path: ci
          retention-days: 3
