name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the proposal below.
        Pull requests are not accepted. See https://github.com/st-tech/ppf-contact-solver/blob/main/CONTRIBUTING.md for details.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this feature solve, or what use case does it enable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: A clear description of the feature you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or workarounds you have considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Links, references, screenshots, or anything else that helps.
    validations:
      required: false
  - type: checkboxes
    id: contribution-agreement
    attributes:
      label: Contribution Agreement
      description: Required before submission.
      options:
        - label: "I confirm that any code, patches, scripts, attachments, or other copyrightable material I include in this issue may be used, reproduced, modified, and distributed by this project under the Apache License 2.0 or as otherwise described in CONTRIBUTING.md."
          required: true
        - label: "This is a feature request from the community (please provide a reference below)."
          required: false
  - type: input
    id: community-reference
    attributes:
      label: Community Reference
      description: If this is a community-sourced request, provide a URL or other reference (forum post, chat link, etc.).
      placeholder: https://...
    validations:
      required: false
