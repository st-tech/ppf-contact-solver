# ---- SOLID (soft deformable: density-normalized E/density, density fixed 100.0) --
[Rubber]
description = "Vulcanized rubber (~3 MPa): soft, near-incompressible, grippy"
object_type = "SOLID"
solid_model = "ARAP"
# real: E = 3000000 Pa (for reference)
solid_density = 100.0
solid_young_modulus = 2727.3  # density-normalized = real E / real density
young_mod_density_normalized = true
solid_poisson_ratio = 0.49
friction = 0.85

