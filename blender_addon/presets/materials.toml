# blender_addon/presets/materials.toml
#
# Bundled material presets for the ZOZO Contact Solver Blender addon. Selected
# from the Material Params box; the preset menu is FILTERED by the group's
# current Type (object_type below), and applying a preset never changes the Type.
# Adding a material is a TOML edit only - no code change.
#
# Convention (see calibration/ for the methodology and sources):
#  - SHELL (fabrics): young_mod_density_normalized = true. shell_young_modulus is
#    a CALIBRATED wire membrane stiffness (NOT a textbook Pa; real fabric has no
#    clean bulk modulus). bend / strain_limit_percent are calibrated against
#    published Cusick drape coefficients by calibration/cusick_drape/. Shell bend
#    is also RESOLUTION-INDEPENDENT in the solver (the per-hinge stiffness scales
#    as |edge|^2/area, the convergent Discrete Shells coefficient), so the same
#    bend value gives the same drape regardless of mesh density; these calibrated
#    values hold across resolutions.
#    shell_density: shell bend is DENSITY-NORMALIZED in the solver (like
#    young-mod), so changing shell_density does NOT change the draped/bent shape;
#    bend alone sets it. Density is therefore a free knob the user can tweak (it
#    only affects inertia/contact, not the shape), so it ships at a uniform 1.0
#    kg/m^2: a well-conditioned default that lets a light fabric be mixed with
#    dense bodies without the mass-ratio blowup a real silk GSM (~0.06) would
#    cause. Real GSM values per fabric are recorded in the plan for reference.
#  - SOLID (soft deformable): young_mod_density_normalized = true, like SHELL.
#    solid_young_modulus is the DENSITY-NORMALIZED modulus E/density (= the wire
#    value the solver consumes), so it preserves the same deformation as the real
#    material. solid_density is fixed at 100.0: a wide spread of real volumetric
#    densities gave a mass-ratio spread that ill-conditioned mixed-material
#    systems, so density is a free knob (affects only inertia/contact, not the
#    static shape) shipped at a uniform 100.0 kg/m^3. Real E (Pa) is recorded per
#    material.
#  - PDRD (near-rigid bodies) have NO presets: an exactly-rigid body differs only
#    by density (shipped uniform) and friction, so there is nothing to calibrate.
#    Set pdrd_density and friction directly on the group.
#  - 'description' = dropdown tooltip; 'object_type' = menu filter. Neither is
#    written onto the group by apply (object_type is filter-only).

# ---- SHELL (fabrics) ----------------------------------------------------------
[Silk]
description = "Light, fluid silk: very drapey, smooth, low friction"
object_type = "SHELL"
shell_model = "BARAFF_WITKIN"
shell_density = 1.0
shell_young_modulus = 500.0
young_mod_density_normalized = true
shell_poisson_ratio = 0.4
bend = 1.42
friction = 0.25
enable_strain_limit = true
strain_limit_percent = 6.0

